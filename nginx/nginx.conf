worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;
        location / {
            access_log off;
            return 200 "Hello World!\n";
            add_header Content-Type text/plain;
        }
        location /test {
            access_log off;
            return 200 "TTB-TEST-APP: OK\n";
            add_header Content-Type text/plain;
        }
    }
    
}
